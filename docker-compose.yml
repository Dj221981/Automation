services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./checkpoints:/app/checkpoints
    mem_limit: 2g
    cpus: 2.0

  tensorboard:
    image: tensorflow/tensorflow:latest
    command: tensorboard --logdir=/logs/tensorboard --host=0.0.0.0 --port=6006
    volumes:
      - ./logs/tensorboard:/logs/tensorboard
    ports:
      - "6006:6006"
