name: Production Testing & Quality Checks

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-xdist
    
    - name: Run unit tests with coverage
      run: |
        pytest tests/ -v --cov=src --cov-report=xml --cov-report=html --cov-report=term-missing -n auto
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-${{ matrix.python-version }}
        fail_ci_if_error: false

  lint:
    name: Code Quality & Linting
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 pylint black isort mypy
    
    - name: Format check with black
      run: black --check src/ tests/ --line-length=100
      continue-on-error: true
    
    - name: Import sort check with isort
      run: isort --check-only src/ tests/
      continue-on-error: true
    
    - name: Lint with flake8
      run: |
        flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics
      continue-on-error: true
    
    - name: Type checking with mypy
      run: mypy src/ --ignore-missing-imports --show-error-codes
      continue-on-error: true

  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety
    
    - name: Run bandit security scan
      run: bandit -r src/ -v -ll
      continue-on-error: true
    
    - name: Check dependencies with safety
      run: safety check --json
      continue-on-error: true

  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [test, lint]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip build wheel
        pip install -r requirements.txt
    
    - name: Verify imports
      run: |
        python -c "from src.models.neural_network import DQNNetwork, AgentLearningModel, ExperienceReplay"
        python -c "from src.data.preprocessing import StateNormalizer, DataAugmentation, BatchGenerator"
    
    - name: Run module tests
      run: |
        python src/models/neural_network.py
        python src/data/preprocessing.py

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test, lint]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest
    
    - name: Run integration test
      run: |
        python -c "
import numpy as np
from src.models.neural_network import AgentLearningModel, ExperienceReplay
from src.data.preprocessing import StateNormalizer, NormalizationType, BatchGenerator

# Integration test: Full training pipeline
print('Starting integration test...')

# Initialize components
state_normalizer = StateNormalizer(normalization_type=NormalizationType.MINMAX)
model = AgentLearningModel(
    state_size=64,
    action_size=10,
    learning_rate=0.001,
    device='cpu',
    seed=42
)
replay = ExperienceReplay(state_size=64, max_size=10000, seed=42)

# Fit normalizer
data = np.random.randn(1000, 64).astype(np.float32)
state_normalizer.fit(data)

# Collect experiences
for _ in range(100):
    state = np.random.randn(64).astype(np.float32)
    action = model.select_action(state)
    reward = float(np.random.randn())
    next_state = np.random.randn(64).astype(np.float32)
    done = bool(np.random.random() > 0.9)
    
    # Normalize
    state_norm = state_normalizer.normalize(state)
    next_state_norm = state_normalizer.normalize(next_state)
    
    replay.add(state_norm, action, reward, next_state_norm, done)

# Train
if len(replay) >= 32:
    batch_gen = BatchGenerator(
        states=np.random.randn(100, 64).astype(np.float32),
        actions=np.random.randint(0, 10, 100),
        rewards=np.random.randn(100).astype(np.float32),
        next_states=np.random.randn(100, 64).astype(np.float32),
        dones=np.zeros(100, dtype=np.float32),
        batch_size=32
    )
    
    for states, actions, rewards, next_states, dones in batch_gen:
        loss = model.train_step(states, actions, rewards, next_states, dones)
        assert np.isfinite(loss), 'Loss is NaN or Inf'
    
    model.decay_epsilon()

print('Integration test passed!')
"

  documentation:
    name: Documentation Check
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Check for README
      run: |
        if [ ! -f README.md ]; then
          echo "❌ README.md not found"
          exit 1
        fi
        echo "✅ README.md found"
    
    - name: Check for CONTRIBUTING.md
      run: |
        if [ ! -f CONTRIBUTING.md ]; then
          echo "⚠️  CONTRIBUTING.md not found (optional)"
        else
          echo "✅ CONTRIBUTING.md found"
        fi
    
    - name: Check docstrings in modules
      run: |
        python -c "
import ast
import sys

files = ['src/models/neural_network.py', 'src/data/preprocessing.py']
for filepath in files:
    with open(filepath) as f:
        tree = ast.parse(f.read())
    
    for node in ast.walk(tree):
        if isinstance(node, (ast.FunctionDef, ast.ClassDef)):
            if not ast.get_docstring(node):
                print(f'⚠️  Missing docstring: {filepath}::{node.name}')

print('✅ Docstring check complete')
"

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test, lint, security, build, integration-test, documentation]
    if: always()
    
    steps:
    - name: Check test results
      run: |
        if [ "${{ needs.test.result }}" != "success" ]; then
          echo "❌ Tests failed"
          exit 1
        fi
        echo "✅ All tests passed"
    
    - name: Comment on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '✅ Production quality checks passed! Ready for review.'
          })
