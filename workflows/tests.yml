name: Tests

on:
  push:
    branches: [ main, Ai-morphasis, agentic-memory-system, long-term-memory ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint with flake8
      run: |
        flake8 src tests --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src tests --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Test with pytest
      run: |
        pytest tests/ -v --cov=src --cov-report=xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: unittests
        fail_ci_if_error: false

  deepmind:
    name: DeepMind tools
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install optional DeepMind tools/deps if present in extras or requirements
          pip install -r requirements.txt || true
          if [ -f requirements-deepmind.txt ]; then pip install -r requirements-deepmind.txt || true; fi

      - name: Run DeepMind tools
        run: |
          # Prefer a repository script that encapsulates the actual DeepMind tool commands.
          if [ -x .github/scripts/run_deepmind.sh ]; then
            echo "Running .github/scripts/run_deepmind.sh"
            bash .github/scripts/run_deepmind.sh
          elif [ -f .github/scripts/run_deepmind.py ]; then
            echo "Running .github/scripts/run_deepmind.py"
            python .github/scripts/run_deepmind.py
          else
            echo "No DeepMind run script found at .github/scripts/run_deepmind.*; skipping DeepMind tools job."
          fi
